<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="quiz-card">
      <div class="quiz-header">
        <p class="quiz-progress" id="question-number">Question 1 of 57</p>
        <h1>Quiz Challenge</h1>
        <p class="quiz-subtitle">Choose the best answer and track your score as you go.</p>
      </div>

      <div id="quiz-screen">
        <div class="question-block">
          <h2 id="question-text"></h2>
        </div>

        <div class="options" id="options-container"></div>

        <div class="feedback" id="feedback-text"></div>

        <div class="actions">
          <button id="next-btn" class="action-btn primary" disabled>Next Question</button>
        </div>
      </div>

      <div id="result-screen" class="hidden">
        <div class="result-box">
          <p class="result-label">Quiz Complete</p>
          <h2 id="score-text"></h2>
          <p id="score-summary"></p>
          <button id="restart-btn" class="action-btn primary">Restart Quiz</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
